<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가성비 추천템 모음</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #1a1a1a;
    --card-hover: #222;
    --accent: #FF6B35;
    --accent2: #FFD23F;
    --text: #f5f5f5;
    --text-sub: #999;
    --radius: 16px;
    --glow: 0 0 30px rgba(255,107,53,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* 배경 그라디언트 */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(255,107,53,0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255,210,63,0.05) 0%, transparent 50%);
    z-index: -1;
    animation: bgFloat 20s ease-in-out infinite alternate;
  }
  @keyframes bgFloat {
    0% { transform: translate(0,0) rotate(0deg); }
    100% { transform: translate(-5%,3%) rotate(3deg); }
  }

  .container {
    max-width: 440px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* 프로필 헤더 */
  .profile {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease-out;
  }
  .profile-img {
    width: 90px; height: 90px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    box-shadow: var(--glow);
    margin-bottom: 14px;
    object-fit: cover;
    background: var(--card);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    margin-left: auto; margin-right: auto;
  }
  .profile h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .profile h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .profile p {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.5;
  }

  /* 카테고리 탭 */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
    animation: fadeUp 0.7s ease-out;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #333;
    background: transparent;
    color: var(--text-sub);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 700;
  }
  .tab:hover { border-color: var(--accent); color: var(--text); }

  /* 상품 카드 */
  .products { display: flex; flex-direction: column; gap: 12px; }
  .product-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s ease;
    border: 1px solid transparent;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.5s ease-out forwards;
  }
  .product-card:hover {
    background: var(--card-hover);
    border-color: rgba(255,107,53,0.3);
    box-shadow: var(--glow);
    transform: translateY(-2px) !important;
  }
  .card-emoji {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,210,63,0.1));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-info h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-info p {
    font-size: 11px;
    color: var(--text-sub);
  }
  .card-arrow {
    color: var(--accent);
    font-size: 18px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .product-card:hover .card-arrow { transform: translateX(4px); }

  /* NEW 뱃지 */
  .badge-new {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* 빈 상태 */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-sub);
    font-size: 14px;
  }

  /* 푸터 */
  .footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #222;
    animation: fadeUp 1s ease-out;
  }
  .footer p {
    font-size: 11px;
    color: #555;
    line-height: 1.6;
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  /* 로딩 스피너 */
  .loading {
    text-align: center;
    padding: 40px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SNS 링크 */
  .social-links {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeUp 0.75s ease-out;
  }
  .social-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid #333;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    font-size: 20px;
    transition: all 0.2s;
  }
  .social-btn:hover {
    border-color: var(--accent);
    background: var(--card-hover);
    transform: scale(1.1);
  }
</style>
</head>
<body>
<div class="container">

  <!-- 프로필 -->
  <div class="profile">
    <div class="profile-img">🔥</div>
    <h1><span>가성비 추천템</span> 모음</h1>
    <p>매일 업데이트되는 꿀템 리스트<br>쿠팡 최저가 링크 모음</p>
  </div>

  <!-- SNS 링크 -->
  <div class="social-links">
    <a href="#" class="social-btn" id="youtube-link" title="유튜브">🎬</a>
    <a href="#" class="social-btn" id="inpock-link" title="전체 링크">🔗</a>
  </div>

  <!-- 카테고리 탭 -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-cat="all">전체</button>
  </div>

  <!-- 상품 목록 -->
  <div class="products" id="products">
    <div class="loading">
      <div class="spinner"></div>
      <p style="color:#999;font-size:13px;">상품 불러오는 중...</p>
    </div>
  </div>

  <!-- 푸터 -->
  <div class="footer">
    <p>본 페이지에는 쿠팡 파트너스 활동의 일환으로<br>일정액의 수수료를 제공받는 링크가 포함되어 있습니다.</p>
  </div>
</div>

<script>
// ── 설정 ──
const CONFIG = {
  productsUrl: './products.json',       // 상품 데이터 URL
  youtubeUrl: '',                        // 유튜브 채널 URL
  inpockUrl: 'https://link.inpock.co.kr/cheap_best_list',
  newDays: 3,                            // NEW 뱃지 표시 기간(일)
  categoryEmojis: {
    '전체': '🔥', '생활': '🏠', '주방': '🍳', '뷰티': '💄',
    '패션': '👗', 'IT': '📱', '캠핑': '⛺', '운동': '💪',
    '식품': '🍜', '기타': '📦'
  }
};

// ── SNS 링크 설정 ──
document.getElementById('youtube-link').href = CONFIG.youtubeUrl || '#';
document.getElementById('inpock-link').href = CONFIG.inpockUrl;

// ── 상품 로드 ──
let allProducts = [];

async function loadProducts() {
  const container = document.getElementById('products');
  try {
    const res = await fetch(CONFIG.productsUrl + '?t=' + Date.now());
    allProducts = await res.json();

    // 최신순 정렬
    allProducts.sort((a, b) => new Date(b.added_at || 0) - new Date(a.added_at || 0));

    // 카테고리 탭 생성
    buildTabs();
    // 상품 렌더링
    renderProducts('all');
  } catch (e) {
    container.innerHTML = '<div class="empty">아직 등록된 상품이 없습니다.<br>곧 추천템이 업데이트됩니다! 🎁</div>';
  }
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  const cats = new Set(['all']);
  allProducts.forEach(p => { if (p.category) cats.add(p.category); });

  tabsEl.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === 'all' ? ' active' : '');
    btn.dataset.cat = cat;
    btn.textContent = cat === 'all' ? '전체' : cat;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderProducts(cat);
    });
    tabsEl.appendChild(btn);
  });
}

function renderProducts(category) {
  const container = document.getElementById('products');
  const filtered = category === 'all'
    ? allProducts
    : allProducts.filter(p => p.category === category);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">이 카테고리에는 아직 상품이 없어요 😅</div>';
    return;
  }

  const now = new Date();
  container.innerHTML = filtered.map((p, i) => {
    const isNew = p.added_at && (now - new Date(p.added_at)) < CONFIG.newDays * 86400000;
    const emoji = CONFIG.categoryEmojis[p.category] || CONFIG.categoryEmojis['기타'];
    const newBadge = isNew ? '<span class="badge-new">NEW</span>' : '';
    return `
      <a href="${p.affiliate_url}" target="_blank" rel="noopener" class="product-card"
         style="animation-delay:${i * 0.06}s">
        <div class="card-emoji">${emoji}</div>
        <div class="card-info">
          <h3>${p.product_name}${newBadge}</h3>
          <p>${p.description || '쿠팡 최저가 확인하기'}</p>
        </div>
        <div class="card-arrow">›</div>
      </a>`;
  }).join('');
}

// 초기 로드
loadProducts();
</script>
</body>
</html>
